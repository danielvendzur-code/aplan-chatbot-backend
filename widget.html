<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aplan Asistent</title>
<meta name="description" content="Webový AI asistent pre projektovú kanceláriu Aplan. Prevedie klienta úradnými postupmi, dokumentmi a komunikáciou s úradom a umožní rezervovať konzultáciu.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ——— Aplan architektonická paleta: čistá, technická, dôveryhodná ——— */
  --ink:#16181C;        /* primárna tmavá */
  --ink-2:#23262E;
  --ink-3:#33373F;
  --paper:#FFFFFF;
  --bg:#F4F4F1;         /* off-white podklad */
  --soft:#EFEEE9;
  --soft-2:#F8F8F5;
  --line:#E3E2DC;
  --line-2:#D7D6CE;
  --muted:#6E6E66;
  --muted-2:#8C8C83;
  --accent:#141414;     /* monochrome editorial — podľa finálneho webu Aplan */
  --accent-2:#3B3B38;
  --accent-soft:#EBEBE8;
  --ok:#3E7C5A;
  --warn:#B8893A;
  --hard:#B25540;
  --shadow:0 30px 80px rgba(22,24,28,.20);
  --shadow-sm:0 12px 34px rgba(22,24,28,.12);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:18px;
  --ai-vh:100dvh;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
body.ai-locked{overflow:hidden;position:fixed;width:100%;left:0;right:0}

/* ============ TEASER BUBLINA ============ */
#ai-teaser{position:fixed;right:20px;bottom:104px;z-index:99998;width:326px;background:var(--paper);color:var(--ink);border:1px solid var(--line-2);box-shadow:0 18px 48px rgba(20,20,20,.15);border-radius:14px;padding:15px 17px 15px;font:500 13px/1.55 var(--font);opacity:0;transform:translateY(10px);pointer-events:none;transition:all .3s ease;cursor:pointer}
#ai-teaser:hover{transform:translateY(-2px);box-shadow:0 22px 54px rgba(20,20,20,.19)}
.tz-h{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding-right:24px}
.tz-logo{display:flex}.tz-logo svg{width:18px;height:18px}
.tz-h b{font:800 11px var(--font);letter-spacing:.22em}
.tz-on{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font:600 10.5px var(--font);color:var(--muted)}
.tz-on i{width:7px;height:7px;border-radius:50%;background:#52c989}
#ai-teaser-txt{color:var(--ink-2);display:block;min-height:40px}
.tz-cta{display:inline-flex;align-items:center;gap:7px;margin-top:9px;font:800 10px var(--font);letter-spacing:.16em;text-transform:uppercase;color:#141414;border-bottom:1px solid #141414;padding-bottom:2px}
.tz-cta svg{width:12px;height:12px;transition:transform .22s}
#ai-teaser:hover .tz-cta svg{transform:translateX(3px)}
#ai-teaser.show{opacity:1;transform:none;pointer-events:auto}
#ai-teaser:hover{border-color:var(--line-2)}
#ai-teaser b{color:var(--accent-2)}
#ai-teaser-txt{transition:opacity .25s ease;display:inline-block}
#ai-teaser:after{content:"";position:absolute;right:30px;bottom:-7px;width:14px;height:14px;background:var(--paper);border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
#ai-teaser .x{position:absolute;right:8px;top:8px;width:22px;height:22px;border:0;background:var(--soft);color:var(--muted);border-radius:50%;font-size:13px;cursor:pointer;line-height:1}

/* ============ LAUNCHER ============ */
#ai-launch{position:fixed;right:20px;bottom:20px;z-index:100000;width:70px;height:70px;border:1px solid rgba(20,20,20,.12);border-radius:18px;background:#fff;box-shadow:0 14px 34px rgba(22,24,28,.22);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .22s ease,box-shadow .22s ease,opacity .2s}
#ai-launch:hover{transform:translateY(-2px);box-shadow:0 18px 42px rgba(22,24,28,.28)}
#ai-launch.open{opacity:0;pointer-events:none;transform:scale(.85)}
#ai-launch .mono{width:40px;height:40px}

/* ============ CHAT PANEL ============ */
#ai-panel{position:fixed;right:20px;bottom:20px;z-index:99999;width:444px;height:min(764px,calc(var(--ai-vh) - 40px));background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(20px) scale(.96);transform-origin:bottom right;transition:opacity .22s,transform .34s cubic-bezier(.2,1.2,.2,1)}
#ai-panel.open{opacity:1;pointer-events:auto;transform:none}

.ai-head{position:relative;display:flex;align-items:center;gap:13px;padding:16px 16px;background:var(--ink);color:#fff}
.ai-head .av{width:34px;display:flex;align-items:center;flex:0 0 auto}
.ai-head .av .mono{width:34px;height:34px}
.ai-head .ht{flex:1;min-width:0}
.ai-head .ht .t{font:700 14.5px var(--font);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-head .ht .s{display:flex;align-items:center;gap:6px;font:600 11.5px var(--font);color:rgba(255,255,255,.6);margin-top:3px}
.ai-head .ht .s i{width:7px;height:7px;border-radius:50%;background:#52c989;display:inline-block}
.ai-head .ht .s b{color:var(--accent);font-weight:700}
.ai-hactions{display:flex;gap:6px;flex:0 0 auto}
.hbtn{width:34px;height:34px;border:0;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,color .18s}
.hbtn:hover{background:rgba(255,255,255,.2);color:#fff}
.hbtn svg{width:17px;height:17px}

.ai-body{flex:1;overflow-y:auto;padding:18px 16px 8px;background:linear-gradient(180deg,var(--soft-2),var(--paper));scroll-behavior:smooth;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.ai-body::-webkit-scrollbar{width:7px}
.ai-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px}

/* správy */
.msg{display:flex;gap:9px;margin-bottom:14px;animation:rise .32s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg .ma{width:30px;height:30px;border-radius:9px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.msg .ma .mono{width:19px;height:19px}
.msg .col{max-width:84%;display:flex;flex-direction:column}
.msg.user .col{align-items:flex-end}
.msg .mb{max-width:100%;font:500 14px/1.55 var(--font)}
.mt{font:600 10px var(--font);color:var(--muted-2);margin-top:3px;padding:0 3px}
.msg.bot .mb{background:var(--paper);border:1px solid var(--line);color:var(--ink);padding:11px 14px;border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px rgba(22,24,28,.04)}
.msg.user{flex-direction:row-reverse}
.msg.user .mb{background:var(--ink);color:#fff;padding:11px 14px;border-radius:16px 4px 16px 16px}
.msg.user .ma{background:var(--accent)}
.msg.user .ma::after{content:"Vy";font:800 9px var(--font);color:#fff}
.mb b{font-weight:800}
.mb .mini{display:block;margin-top:7px;font:600 11.5px/1.45 var(--font);color:var(--muted)}
.mb ul{margin:8px 0 2px;padding-left:18px}
.mb .ai-p{margin:0 0 8px}
.mb .ai-p:last-child{margin-bottom:0}
.mb .ai-ul{margin:2px 0 8px;padding-left:2px;list-style:none}
.mb .ai-ul li{position:relative;padding-left:16px;margin-bottom:5px}
.mb .ai-ul li::before{content:"";position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:2px;background:var(--accent)}
.mb li{margin-bottom:5px}

/* typing */
.typing{display:flex;gap:4px;padding:13px 15px;background:var(--paper);border:1px solid var(--line);border-radius:4px 16px 16px 16px;width:fit-content}
.typing span{width:7px;height:7px;border-radius:50%;background:#A9A9A2;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
/* zoskupené botové správy — avatar len pri prvej, menšia medzera */
.msg.bot + .msg.bot{margin-top:-6px}
.msg.bot + .msg.bot > .ma{opacity:0}
.msg.bot + .msg.bot .mb{border-top-left-radius:16px}
/* drobné dizajnové vylepšenia */
.caret{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:-2px;margin-left:1px;animation:caretB .8s steps(1) infinite}
@keyframes caretB{50%{opacity:0}}
#ai-launch:hover{box-shadow:0 18px 42px rgba(22,24,28,.34),0 0 0 3px rgba(17,17,17,.18)}
.msg.user .mb{background:linear-gradient(135deg,var(--ink) 0%,var(--ink-3) 100%)}
.chip:active,.qa:active,.foot-resv:active{transform:scale(.97)}
.ai-body::-webkit-scrollbar-thumb:hover{background:var(--accent)}
/* premýšľajúci stav */
.think-row .col2{display:flex;flex-direction:column;gap:7px;max-width:84%}
.think{font:600 11.5px/1.4 var(--font);color:var(--muted-2);font-style:italic;transition:opacity .17s;padding-left:2px}
/* Calendly priamo v okne */
.cal-embed{margin-top:8px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;height:min(600px,calc(var(--ai-vh) - 268px));box-shadow:0 6px 20px rgba(22,24,28,.06);transition:height .25s ease;position:relative}
.cal-embed-load{padding:44px 20px;text-align:center;color:var(--muted);font:600 13px/1.6 var(--font)}
.cal-load-sub{font:500 11px/1.5 var(--font);color:var(--muted-2)}
.cal-spin{display:block;width:22px;height:22px;margin:0 auto 12px;border:2.5px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:calspin .8s linear infinite}
@keyframes calspin{to{transform:rotate(360deg)}}
/* prekrytie počas načítavania Calendly */
.cal-overlay{position:absolute;inset:0;z-index:5;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 22px;transition:opacity .4s ease}
.cal-overlay.hide{opacity:0;pointer-events:none}
.cal-skel{display:grid;grid-template-columns:repeat(7,15px);gap:5px;margin-bottom:18px}
.cal-skel i{width:15px;height:15px;border-radius:4px;background:var(--soft);animation:skelPulse 1.6s ease infinite}
.cal-skel i:nth-child(3n){animation-delay:.25s}
.cal-skel i:nth-child(4n){background:var(--line)}
@keyframes skelPulse{0%,100%{opacity:.45}50%{opacity:1}}
.cal-load-title{font:800 10.5px var(--font);letter-spacing:.14em;text-transform:uppercase;color:#141414;margin-bottom:6px;transition:opacity .25s}
.cal-overlay .cal-load-sub{max-width:240px;margin:0 auto}
.cal-prog{width:150px;height:2px;background:var(--soft);margin-top:16px;overflow:hidden}
.cal-prog i{display:block;height:100%;width:36%;background:#141414;animation:progSlide 1.4s ease-in-out infinite}
@keyframes progSlide{0%{transform:translateX(-110%)}100%{transform:translateX(430%)}}
.cal-embed iframe{border:0;width:100%;height:100%}
/* wipe efekt — biela sa nasunie zľava, text sčernie */
@media(max-width:520px){.cal-embed{height:min(560px,calc(var(--ai-vh) - 232px))}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 16px 39px;animation:rise .3s ease both}
.chip{background:#fff;border:1px solid var(--line-2);color:var(--ink);border-radius:11px;padding:10px 16px;font:600 13px var(--font);letter-spacing:.01em;cursor:pointer;transition:border-color .35s ease,box-shadow .35s ease,transform .35s cubic-bezier(.25,.6,.25,1),background-color .35s ease,color .35s ease;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.chip:hover{border-color:#141414;transform:translateY(-2px);box-shadow:0 8px 20px rgba(20,20,20,.13)}
.chip .ic{width:15px;height:15px;opacity:.7}
.chip.primary{background:#141414;color:#fff;border-color:#141414}


/* úvodné menu — premiový zoznam */
.menu{margin:6px 0 12px 0;animation:rise .3s ease both}
.menu-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--paper);box-shadow:0 8px 24px rgba(22,24,28,.07)}
.mrow{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line);background:var(--paper);padding:12px 15px;cursor:pointer;transition:background .2s;font-family:var(--font)}
.mrow:last-child{border-bottom:0}
.mrow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:#141414;transform:scaleY(0);transform-origin:center;transition:transform .22s;border-radius:0}
.mrow:hover{background:var(--soft-2)}
.mrow:hover::before{transform:scaleY(1)}
.mi{width:34px;height:34px;flex:0 0 auto;border:1px solid var(--line-2);border-radius:10px;background:var(--soft-2);display:flex;align-items:center;justify-content:center;transition:background .22s,border-color .22s,transform .22s}
.mi svg{width:17px;height:17px;stroke:#141414;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .22s}
.mrow:hover .mi{background:#141414;border-color:#141414;transform:translateY(-1px)}
.mrow:hover .mi svg{stroke:#fff}
.mrow .mt2{flex:1;min-width:0;transition:transform .22s}
.mrow:hover .mt2{transform:translateX(2px)}
.mrow .mt2 b{display:block;font:700 13.5px var(--font);color:var(--ink);letter-spacing:-.01em}
.mrow .mt2 span{display:block;font:600 11px var(--font);color:var(--muted);margin-top:1px}
.mrow .mchev{width:15px;height:15px;color:var(--line-2);flex:0 0 auto;transition:transform .22s,color .22s}
.mrow:hover .mchev{color:#141414;transform:translateX(4px)}
/* — „Preveďte ma" — čierny editorial riadok — */
.mrow.featured{background:#141414;padding:15px}
.mrow.featured::before{background:#fff}
.mrow.featured:hover{background:#1D1D1B}
.mrow.featured .mi{background:transparent;border-color:rgba(255,255,255,.32)}
.mrow.featured .mi svg{stroke:#fff}
.mrow.featured:hover .mi{background:#fff;border-color:#fff;transform:translateY(-1px)}
.mrow.featured:hover .mi svg{stroke:#141414}
.mrow.featured .mt2 b{color:#fff}
.mrow.featured .mt2 span{color:rgba(255,255,255,.6)}
.mrow.featured .mchev{color:rgba(255,255,255,.85)}
.mrow.featured:hover .mchev{color:#fff;transform:translateX(4px)}
@media(prefers-reduced-motion:reduce){.mrow.featured::after,.mi,.mrow .mt2,.mrow .mchev{transition:none!important}}
.menu .resv{margin-bottom:11px}
.resv{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .15s}
.resv:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(22,24,28,.06)}
.resv.hi{border-color:var(--accent);background:var(--accent-soft)}
.resv.hi:hover{box-shadow:0 8px 22px rgba(17,17,17,.10)}
.resv .ri{width:40px;height:40px;border-radius:11px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.resv.hi .ri{background:var(--accent-2)}
.resv .ri svg{width:19px;height:19px;color:#fff;stroke:#fff}
.resv .rt{flex:1;min-width:0}
.resv .rt b{font:800 13.5px var(--font);display:block;color:var(--ink)}
.resv .rt span{font:600 11px var(--font);color:var(--muted)}
.resv .rg svg{width:16px;height:16px;color:var(--muted-2)}
.aplan-note{margin-top:8px;border-left:2px solid var(--accent);background:var(--accent-soft);border-radius:0 10px 10px 0;padding:9px 12px;font:600 12px/1.5 var(--font);color:var(--ink-3)}
.aplan-note b{color:var(--ink)}
.gdpr{display:flex;align-items:flex-start;gap:8px;margin:9px 0 2px;cursor:pointer}
.gdpr input{margin-top:1px;accent-color:var(--accent);flex:0 0 auto;width:15px;height:15px;cursor:pointer}
.gdpr span{font:600 10.5px/1.45 var(--font);color:var(--muted)}
.gdpr a{color:var(--accent-2);font-weight:700}
.confirm-send{display:inline-block;margin-top:11px;background:var(--ink);color:#fff;text-decoration:none;border-radius:11px;padding:10px 16px;font:800 13px var(--font);transition:color .18s}
.confirm.err{border-left-color:#B25540;background:#f7e7e2}
.confirm.err a{color:#8c3a29;font-weight:700}
.field input.bad,.field textarea.bad{border-color:#B25540;box-shadow:0 0 0 3px rgba(178,85,64,.12)}
.hist-note{text-align:center;font:600 10px var(--font);letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);margin:4px 0 12px;position:relative}
.hist-note::before,.hist-note::after{content:"";position:absolute;top:50%;width:24%;height:1px;background:var(--line)}
.hist-note::before{left:6px}.hist-note::after{right:6px}
/* rozklikávateľné kroky postupu */
.steps{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper);margin-top:8px;box-shadow:0 4px 14px rgba(22,24,28,.05)}
.stp{border-bottom:1px solid var(--line)}
.stp:last-child{border-bottom:0}
.stp-h{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:transparent;padding:11px 12px;cursor:pointer;font-family:var(--font);transition:background .15s}
.stp-h:hover{background:var(--soft-2)}
.stp-n{width:25px;height:25px;border-radius:8px;background:#fff;border:1.5px solid #141414;color:#141414;font:800 12px var(--font);display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:background .18s}
.stp.open .stp-n{background:#EBEBE8}
.stp-tt{flex:1;min-width:0}
.stp-tt b{display:block;font:700 12.5px var(--font);color:var(--ink)}
.stp-tt span{display:block;font:600 10.5px var(--font);color:var(--muted);margin-top:1px}
.stp-x{font:700 17px var(--font);line-height:1;color:var(--muted-2);flex:0 0 auto;width:18px;text-align:center}
.stp.open .stp-x{color:var(--accent-2)}
.stp-d{max-height:0;overflow:hidden;transition:max-height .28s ease}
.stp.open .stp-d{max-height:520px}
.stp-d-in{padding:0 14px 13px 47px;font:500 12px/1.6 var(--font);color:var(--ink-3)}

/* karty / panely vnútri správy */
.panel{margin-top:10px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper)}
.panel-h{background:var(--soft);padding:10px 13px;font:800 12.5px var(--font);letter-spacing:.02em;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.panel-h .pin{width:8px;height:8px;border-radius:2px;background:var(--accent)}
.panel-b{padding:13px}

/* prehliadač oblastí (KB) */
.kbcat{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid var(--line);background:var(--soft-2);border-radius:12px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.kbcat:last-child{margin-bottom:0}
.kbcat:hover{border-color:var(--accent);background:var(--accent-soft)}
.kbcat .ic{width:18px;height:18px;color:var(--accent-2);flex:0 0 auto}
.kbcat>div{flex:1;min-width:0}
.kbcat .kt{font:800 13px var(--font);color:var(--ink)}
.kbcat .kd{font:600 11px var(--font);color:var(--muted);margin-top:1px}
.kbcat>svg:last-child{width:16px;height:16px;color:var(--muted-2);flex:0 0 auto}

/* checklist */
.check{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.check:last-child{border-bottom:0}
.check .box{width:20px;height:20px;border:1.5px solid var(--line-2);border-radius:6px;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.check .box.on{background:#fff;border-color:#141414;color:#141414}
.check .box svg{width:12px;height:12px;opacity:0;transition:opacity .15s}
.check .box.on svg{opacity:1}
.check .ct{font:700 13px var(--font)}
.check .cd{font:500 11.5px/1.4 var(--font);color:var(--muted);margin-top:2px}

/* kroky / steps */
.step{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.step:last-child{border:0}
.step .n{width:25px;height:25px;border-radius:8px;background:var(--ink);color:#fff;font:800 12px var(--font);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.step .st{font:800 13px var(--font);margin-bottom:2px}
.step .sd{font:500 12px/1.45 var(--font);color:var(--muted)}

/* mini-formuláre */
.field{margin-bottom:9px}
.field label{display:block;font:700 11.5px var(--font);color:var(--ink-3);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:11px;background:var(--soft-2);font:600 13px var(--font);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;font-family:var(--font)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(17,17,17,.10);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn-go{width:100%;background:var(--ink);color:#fff;border:0;border-radius:12px;padding:12px;font:800 14px var(--font);cursor:pointer;margin-top:4px;transition:background .18s}
.btn-ghost{width:100%;background:var(--soft);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:11px;font:700 13px var(--font);cursor:pointer;margin-top:7px}

/* kalendár */
.cal-l{font:800 10px var(--font);letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin:14px 2px 8px}
.cal-card>.cal-l:first-child{margin-top:2px}
.cal-types{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-type{display:flex;align-items:center;gap:11px;border:0;border-bottom:1px solid var(--line);padding:12px 13px;cursor:pointer;transition:background .15s;background:transparent}
.cal-type:last-child{border-bottom:0}
.cal-type:hover{background:var(--accent-soft)}
.cal-type.on{background:var(--accent-soft)}
.cal-type .ctt{flex:1;min-width:0}
.cal-type .tt{font:800 13px var(--font);color:var(--ink)}
.cal-type .td{font:600 11px var(--font);color:var(--muted);margin-top:2px}
.cal-type .rad{width:19px;height:19px;border-radius:50%;border:2px solid var(--line-2);flex:0 0 auto;position:relative;transition:all .15s}
.cal-type.on .rad{border-color:var(--accent)}
.cal-type.on .rad::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 9px}
.cal-month{font:800 14px var(--font);color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font:700 9.5px var(--font);color:var(--muted-2);text-align:center;text-transform:uppercase;padding:2px 0 5px}
.cal-day{aspect-ratio:1;border:1px solid transparent;border-radius:10px;background:transparent;font:600 12.5px var(--font);color:var(--line-2);cursor:default;display:flex;align-items:center;justify-content:center;transition:all .14s}
.cal-day.free{background:#EDF3EF;color:#2F5F46;font-weight:800;cursor:pointer}
.cal-day.free:hover{background:#DCEBE2}
.cal-day.on{background:#141414;color:#fff;font-weight:800}
.cal-times{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cal-time{border:1.5px solid var(--line);border-radius:11px;padding:11px 0;text-align:center;font:700 13px var(--font);color:var(--ink);cursor:pointer;background:var(--paper);transition:all .14s}
.cal-time:hover{border-color:var(--accent);background:var(--accent-soft)}
.cal-time.on{background:#fff;border-color:#141414;box-shadow:inset 0 0 0 1px #141414;color:#141414}
.cal-card{border:1px solid var(--line);border-radius:14px;background:var(--paper);padding:13px;margin-top:10px}

/* generovaný text / box na kopírovanie */
.copybox{background:var(--ink);color:#EDEDE6;border-radius:12px;padding:13px 14px;font:500 12.5px/1.6 var(--font);white-space:pre-wrap;margin-top:4px;max-height:240px;overflow-y:auto}
.copyrow{display:flex;gap:8px;margin-top:8px}
.copyrow button{flex:1;border:0;border-radius:10px;padding:10px;font:800 12.5px var(--font);cursor:pointer}
.cp-copy{background:var(--accent);color:#fff}
.cp-copy.done{background:var(--ok)}
.cp-mail{background:var(--soft);color:var(--ink);border:1px solid var(--line)!important}

/* badge náročnosti */
.diff{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 13px;font:800 12.5px var(--font);margin-top:4px}
.diff.e{background:#e7f2ec;color:var(--ok)}
.diff.m{background:#f6edda;color:var(--warn)}
.diff.h{background:#f6e3dd;color:var(--hard)}
.diff .d{width:9px;height:9px;border-radius:50%;background:currentColor}

/* potvrdenia */
.confirm{margin-top:10px;border:1px solid var(--line);border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:13px 14px}
.confirm .ci{display:flex;align-items:center;gap:8px;font:800 13px var(--font);margin-bottom:5px}
.confirm .cb{font:600 12.5px/1.5 var(--font);color:var(--ink-3)}
.demo-tag{display:inline-block;background:var(--ink);color:#fff;font:800 9px var(--font);letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}

/* rýchle kontakty — kompaktná lišta pod inputom */
/* sticky pätička */
.ai-foot{padding:0 12px 12px;background:var(--paper);display:flex;flex-direction:column;gap:8px}
.foot-resv{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:0;border-radius:12px;letter-spacing:.03em;background:var(--ink);color:#fff;padding:13px;font:800 14px var(--font);cursor:pointer;transition:background .18s}
.foot-resv svg{width:18px;height:18px;color:#fff;stroke:#fff}
.ai-contacts{display:flex;gap:8px}
.qa{flex:1;justify-content:center;border:1px solid var(--line-2);background:var(--soft-2);border-radius:11px;padding:11px 8px;font:700 13px var(--font);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none;white-space:nowrap;transition:all .15s}
.qa:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--ink)}
.qa svg{width:17px;height:17px;opacity:.8}
/* .qa.lead — zámerne bez odlíšenia, rovnaký vzhľad ako ostatné kontakty */

/* composer */
.ai-compose{display:flex;gap:8px;padding:11px 12px 13px;border-top:1px solid var(--line);background:var(--paper)}
.ai-compose input{flex:1;border:1.5px solid var(--line-2);border-radius:13px;padding:12px 14px;font:600 14px var(--font);outline:none;font-family:var(--font)}
.ai-compose input:focus{border-color:var(--accent)}
.ai-compose .send{width:46px;border:0;border-radius:13px;background:var(--ink);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ai-compose .send svg{width:19px;height:19px}
.disclaim{font:600 9.5px/1.3 var(--font);color:var(--muted-2);text-align:center;padding:0 14px 9px;background:var(--paper)}

@media(max-width:520px){
  #ai-panel{right:0;bottom:0;width:100%;height:var(--ai-vh);max-height:var(--ai-vh);border-radius:0}
  #ai-launch{right:16px;bottom:16px}
  html:not(.host-desktop) #ai-teaser{display:none!important}
  .msg .mb{max-width:88%}
  .ai-compose input{font-size:16px}
  /* spodná časť tenšia — vizuálne vyvážená s hlavičkou */
  .ai-head{padding:13px 14px}
  .ai-compose{padding:9px 12px 9px}
  .ai-compose input{padding:10px 13px}
  .ai-foot{padding:0 12px 9px;gap:7px}
  .foot-resv{padding:11px;font-size:13px}
  .foot-resv svg{width:16px;height:16px}
  .qa{padding:9px 6px;font-size:12.5px}
  .qa svg{width:15px;height:15px}
}
/* — inverzia farieb + tenká linka zo stredu pod textom (variant D) — */
.foot-resv,.btn-go,.confirm-send,.ai-compose .send,.chip.primary{transition:background-color .3s ease,color .3s ease,box-shadow .3s ease}
.foot-resv:hover,.btn-go:hover,.confirm-send:hover,.chip.primary:hover{background:#fff;color:#141414;box-shadow:0 0 0 1px #141414}
.foot-resv svg{transition:color .3s ease,stroke .3s ease}
.foot-resv:hover svg{color:#141414;stroke:#141414}
.foot-resv span{position:relative}
.foot-resv span::after,.btn-go::after,.confirm-send::after{content:"";position:absolute;left:50%;bottom:-3px;width:100%;height:1.5px;background:#141414;transform:translateX(-50%) scaleX(0);transform-origin:center;transition:transform .65s cubic-bezier(.22,.61,.36,1)}
.btn-go,.confirm-send{position:relative}
.btn-go::after,.confirm-send::after{width:42%;bottom:8px}
.foot-resv:hover span::after,.btn-go:hover::after,.confirm-send:hover::after{transform:translateX(-50%) scaleX(1)}
.ai-compose .send svg{transition:transform .3s cubic-bezier(.25,.6,.25,1),stroke .3s ease}
.ai-compose .send:hover{background:#fff;box-shadow:0 0 0 1px #141414}
.ai-compose .send:hover svg{stroke:#141414;transform:translate(1.5px,-1.5px)}
html,body{background:transparent!important}
</style>
</head>

<script>

/* ——— Beh vo widgete vloženom cez embed.js (iframe) ——— */

function inIframe(){ try{ return window.parent!==window; }catch(e){ return true; } }
function postSize(mode){ if(!inIframe()) return; try{ parent.postMessage({aplan:'size',mode:mode},'*'); }catch(e){} }
window.addEventListener('message',function(e){
  var d=e&&e.data; if(!d) return;
  if(d.aplanEnv){ hostMobile=!!d.mobile; document.documentElement.classList.toggle('host-desktop',!hostMobile); document.documentElement.classList.toggle('host-mobile',hostMobile); try{ updateAiViewportHeight(); }catch(err){} }
});

/* ——— Logo: skutočné „A" z loga Aplan (obrysové A s výrezom) ——— */
function mono(c){
  c=c||'#fff';
  return `<svg class="mono" viewBox="0 0 1180 1480" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
    <path d="M452.62,0.186l-452.62,1479.81l230.17,0l351.715,-1318.81l362.083,1318.81l236.032,0l-452.683,-1479.81l-274.697,0Z" fill="${c}"/>
  </svg>`;
}
document.getElementById('launchmono').outerHTML = mono('#141414');
document.getElementById('headmono').outerHTML = mono('#fff');
var bm=document.getElementById('brandmono'); if(bm) bm.innerHTML = mono('#111');
var tzl=document.querySelector('.tz-logo'); if(tzl) tzl.innerHTML = mono('#141414');
var ctam=document.getElementById('ctamono'); if(ctam) ctam.innerHTML = mono();

/* ——— domovská stránka: menu po scrolle + reveal animácie ——— */
(function(){
  const nav=document.getElementById('topnav');
  if(nav){
    const onScroll=()=>nav.classList.toggle('solid', window.scrollY>40);
    window.addEventListener('scroll',onScroll,{passive:true}); onScroll();
  }
  if('IntersectionObserver' in window){
    const io=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }),{threshold:.14});
    document.querySelectorAll('.reveal').forEach((el,i)=>{ el.style.transitionDelay=(Math.min(i%4,3)*70)+'ms'; io.observe(el); });
  } else {
    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
  }
})();

const body  = document.getElementById('ai-body');
const input = document.getElementById('ai-input');
let started = false;
let savedScrollY = 0;

function isMobileChat(){ if(hostMobile!==null) return hostMobile; return window.matchMedia('(max-width:520px)').matches; }
function updateAiViewportHeight(){
  const h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  document.documentElement.style.setProperty('--ai-vh',h+'px');
}
updateAiViewportHeight();
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',updateAiViewportHeight);
  window.visualViewport.addEventListener('scroll',updateAiViewportHeight);
}
window.addEventListener('resize',updateAiViewportHeight);

/* ——— ikonky ——— */
const I = {
  search:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="6.5"/><path d="M20.5 20.5 15.8 15.8"/></svg>',

  phone :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>',

/* ——— jadro konverzácie ——— */
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function scroll(){body.scrollTop=body.scrollHeight;}

function stamp(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

/* ——— história konverzácie (localStorage, bezpečné načítanie) ——— */
const STORE_KEY='aplan_ai_v1';
const SESSION_KEY='aplan_ai_session_v1';
let convo=[];          // [{r:'bot'|'user', h, t}]
let restoring=false;   // počas obnovy neukladáme znova
let historyTimer=null;
function sessionId(){
  try{
    let id=localStorage.getItem(SESSION_KEY);
    if(!id){
      id=(window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():('s-'+Date.now()+'-'+Math.random().toString(36).slice(2));
      localStorage.setItem(SESSION_KEY,id);
    }
    return id;
  }catch(e){ return 's-'+Date.now(); }
}
function saveServerConvo(){
  if(!CFG.historyEndpoint||restoring) return;
  clearTimeout(historyTimer);
  historyTimer=setTimeout(()=>{
    fetch(CFG.historyEndpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionId:sessionId(),page:location.href,messages:convo.slice(-80)})
    }).catch(()=>{});
  },650);
}
function saveConvo(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(convo.slice(-80))); }catch(e){}
  saveServerConvo();
}
/* interaktívne panely (formuláre, kalendár, checklist) sa neukladajú —
   po obnove by stratili obsluhu; ukladá sa len text/odpovede/kroky/potvrdenia */
function isInteractive(h){ return /data-(cal|lead|letter|pkg|calc|chk|pkgsend)|data-f=|btn-go|cal-card|copyrow|class="check"/.test(h); }
function bubble(role,h,t){
  const m=el(role==='bot'
    ? `<div class="msg bot"><div class="ma">${mono()}</div><div class="col"><div class="mb">${h}</div><div class="mt">${t}</div></div></div>`
    : `<div class="msg user"><div class="ma"></div><div class="col"><div class="mb">${h}</div><div class="mt">${t}</div></div></div>`);
  body.appendChild(m);scroll();return m;
}
function botMsg(html,opts){
  const t=stamp(); const m=bubble('bot',html,t);
  if(!restoring && !(opts&&opts.persist===false) && !isInteractive(html)){ convo.push({r:'bot',h:html,t:t}); saveConvo(); }
  return m;
}
function userMsg(text){
  const h=esc(text),t=stamp(); bubble('user',h,t);
  if(!restoring){ convo.push({r:'user',h:h,t:t}); saveConvo(); }
}
function restoreConvo(){
  let arr;
  try{ const raw=localStorage.getItem(STORE_KEY); if(!raw) return false; arr=JSON.parse(raw); }
  catch(e){ try{localStorage.removeItem(STORE_KEY);}catch(_){ } return false; }
  if(!Array.isArray(arr)) { try{localStorage.removeItem(STORE_KEY);}catch(_){ } return false; }
  const clean=arr.filter(e=>e&&(e.r==='bot'||e.r==='user')&&typeof e.h==='string');
  if(!clean.length) return false;
  restoring=true;
  try{ clean.forEach(e=>bubble(e.r,e.h,e.t||'')); }catch(e){ restoring=false; return false; }
  restoring=false; convo=clean;
  body.appendChild(el('<div class="hist-note">Pokračovanie predchádzajúcej konverzácie</div>'));
  setTimeout(()=>renderMenu(),150);
  return true;
}

function chipRow(list){
  body.querySelectorAll('.chips').forEach(x=>x.remove());

}

function needResult(){
  // jednoduchá scenárovaná logika

  if(t==='menšia stavba'){zaver='ohláška drobnej stavby alebo jednoduchšia projektová dokumentácia';naroc='e';narocT='jednoduché';}
  else if(t==='dodatočná legalizácia'){zaver='dodatočné konanie a zameranie skutočného stavu — typicky náročnejší prípad';naroc='h';narocT='komplikované';}
  else if(t==='rekonštrukcia'||t==='zmena stavby'){zaver='projekt zmeny stavby a podľa rozsahu ohláška alebo stavebné povolenie';naroc='m';}
  else if(t==='prístavba'||t==='nadstavba'){zaver='projektová dokumentácia pre stavebné povolenie (zásah do existujúcej stavby)';naroc='m';}
  else if(t==='nový rodinný dom'){zaver='projektová dokumentácia pre stavebné povolenie rodinného domu';naroc='m';}
  else if(t==='kúpa pozemku'){zaver='úvodné posúdenie možností pozemku a územnoplánovacia informácia ešte pred kúpou';naroc='e';narocT='jednoduché';}

    {t:'Zobraziť checklist dokumentov',ic:I.list,primary:true,fn:()=>flowChecklist(need.typ)},

function copyBlock(text){

    if(mb) mb.onclick=()=>{ window.location.href='mailto:?body='+encodeURIComponent(text); };
  },30);

/* === ODOSLANIE DOPYTU ===
   Produkcia: ak je CFG.leadEndpoint vyplnený, pošle JSON POST na backend.
   Bez endpointu fallback otvorí e-mail s predvyplnenými údajmi (reálne doručí firme). */
async function sendLead(data){
  if(CFG.leadEndpoint){
    const payload=Object.assign({},data,{sessionId:sessionId(),page:location.href,conversation:convo.slice(-30)});
    const r=await fetch(CFG.leadEndpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return {via:'api'};
  }
  const subject=(data.predmet||'Dopyt z webu')+' — '+CFG.firma;
  const body=['Nový dopyt z webu — '+CFG.firma,''].concat(Object.keys(data).map(k=>k+': '+data[k])).join('\n');
  window.location.href=`mailto:${CFG.leadEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  return {via:'email'};
}

let calendlyLoading=false;
function loadCalendly(cb){
  if(window.Calendly){ cb(); return; }
  const done=()=>{ if(window.Calendly) cb(); else cb(true); };
  if(calendlyLoading){ let n=0; const iv=setInterval(()=>{ if(window.Calendly){clearInterval(iv);cb();} else if(++n>60){clearInterval(iv);cb(true);} },100); return; }
  calendlyLoading=true;
  if(!document.getElementById('calendly-css')){ const l=document.createElement('link'); l.id='calendly-css'; l.rel='stylesheet'; l.href='https://assets.calendly.com/assets/external/widget.css'; document.head.appendChild(l); }
  const s=document.createElement('script'); s.src='https://assets.calendly.com/assets/external/widget.js'; s.async=true;
  s.onload=done; s.onerror=()=>cb(true); document.head.appendChild(s);
}
let calOverlayTimer=null;
function calOverlayDone(){
  if(calOverlayTimer){clearInterval(calOverlayTimer);calOverlayTimer=null;}
  const ov=calHost&&calHost.querySelector('.cal-overlay');
  if(ov&&!ov.classList.contains('hide')){ ov.classList.add('hide'); setTimeout(()=>ov.remove(),450); }
}
function calendlyInline(){
  botMsg('<b>Rezervácia konzultácie</b> — vyberte si termín priamo tu. Po potvrdení príde e-mail vám aj nám.');
  const skel='<span class="cal-skel">'+'<i></i>'.repeat(21)+'</span>';
  const m=botMsg('<div class="cal-embed" data-cal-embed><div class="cal-overlay">'+skel+'<div class="cal-load-title" data-cal-msg>Pripájam kalendár</div><div class="cal-load-sub">Načítanie voľných termínov trvá zvyčajne pár sekúnd.</div><div class="cal-prog"><i></i></div></div></div>',{persist:false});
  const host=m.querySelector('[data-cal-embed]'); calHost=host;
  const msgs=['Pripájam kalendár','Načítavam voľné termíny','Ešte chvíľku, už to bude'];
  let mi=0; const msgEl=host.querySelector('[data-cal-msg]');
  calOverlayTimer=setInterval(()=>{ mi=(mi+1)%msgs.length; if(msgEl){ msgEl.style.opacity=0; setTimeout(()=>{ msgEl.textContent=msgs[mi]; msgEl.style.opacity=1; },240);} },2600);
  loadCalendly((err)=>{
    if(err||!window.Calendly){ calOverlayDone(); host.innerHTML='<div class="cal-embed-load">Kalendár sa nepodarilo načítať. <a href="'+esc(CFG.calendly)+'" target="_blank" rel="noopener">Otvoriť rezerváciu v novom okne</a>.</div>'; return; }
    const url=CFG.calendly+(CFG.calendly.indexOf('?')<0?'?':'&')+'hide_gdpr_banner=1&hide_event_type_details=1&primary_color=3E7C5A';
    window.Calendly.initInlineWidget({url:url, parentElement:host});
    setTimeout(calOverlayDone,14000); /* poistka */
  });
  next([{t:'Radšej napíšem dopyt',ic:I.send,fn:flowLead}]);
}
/* potvrdenie rezervácie z Calendly (postMessage) */
window.addEventListener('message',function(e){
  if(!e||!e.data||typeof e.data!=='object') return;
  if(typeof e.data.event==='string' && e.data.event.indexOf('calendly.')===0) calOverlayDone();
  if(e.data.event==='calendly.page_height' && calHost && e.data.payload && e.data.payload.height){
    var ph=parseInt(e.data.payload.height,10);
    if(ph>240) calHost.style.height=Math.min(ph+4, Math.max(380, window.innerHeight-268))+'px';
  }
  if(e.data.event==='calendly.event_scheduled' && document.getElementById('ai-panel').classList.contains('open')){
    botMsg('<div class="confirm"><div class="ci">Termín je rezervovaný</div><div class="cb">Ďakujeme! Potvrdenie vám prišlo e-mailom. Tešíme sa na konzultáciu.</div></div>');
    setTimeout(()=>chipRow([{t:'Poslať aj dopyt',ic:I.send,fn:flowLead},{t:'Hlavné menu',fn:menu}]),200);
  }
});

function renderCalDays(stage){
  const months=['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
  const dow=['Po','Ut','St','Št','Pi','So','Ne'];
  const today=new Date(2026,5,16); // demo: 16. jún 2026
  const y=today.getFullYear(),mo=today.getMonth();
  const first=new Date(y,mo,1); let startIdx=(first.getDay()+6)%7;
  const daysInMonth=new Date(y,mo+1,0).getDate();
  let h=`<div class="cal-l">Termín</div><div class="cal-head"><div class="cal-month">jún 2026</div></div><div class="cal-grid">`;
  dow.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startIdx;i++)h+='<div class="cal-day off"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,mo,d); const wd=(date.getDay()+6)%7;
    const past=d<today.getDate(); const weekend=wd>=5;
    const free=!past&&!weekend&&(d%2===0||d%3===0);
    h+=`<div class="cal-day ${past||weekend?'off':''} ${free?'free':''}" ${free?`data-d="${d}"`:''}>${d}</div>`;
  }
  h+='</div><div data-times></div>';
  stage.innerHTML=h;
  stage.querySelectorAll('[data-d]').forEach(c=>c.onclick=()=>{
    stage.querySelectorAll('.cal-day').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');booking.day=c.dataset.d+'. '+months[mo]+' '+y;
    renderCalTimes(stage.querySelector('[data-times]'));
  });
}
function renderCalTimes(t){
  const times=['08:30','09:30','11:00','13:00','14:30','16:00'];
  let h='<div class="cal-l">Čas</div><div class="cal-times">';
  times.forEach(x=>h+=`<div class="cal-time" data-x="${x}">${x}</div>`);
  h+='</div>';
  t.innerHTML=h;
  t.querySelectorAll('.cal-time').forEach(c=>c.onclick=()=>{
    t.querySelectorAll('.cal-time').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');booking.time=c.dataset.x;
    setTimeout(()=>calContact(),200);
  });
}

function flowChecklist(typ){
  const base=[
    ['List vlastníctva','Preukazuje, kto je vlastníkom pozemku/stavby.'],
    ['Katastrálna mapa','Ukazuje tvar a polohu parcely a susedné pozemky.'],
    ['Parcelné číslo','Jednoznačne identifikuje pozemok.'],
    ['Územnoplánovacia informácia','Z obce — či a ako sa dá na pozemku stavať.'],
    ['Fotky pozemku alebo stavby','Pomôžu projektantovi pri prvotnom posúdení.'],
    ['Informácie o sieťach','Voda, elektrina, kanalizácia, plyn — dostupnosť a napojenie.']
  ];
  const extra={
    'rekonštrukcia':[['Pôvodná projektová dokumentácia','Ak existuje — výrazne urýchli prácu.'],['Rozmery existujúcej stavby','Zameranie alebo aspoň základné rozmery.'],['Staré rozhodnutia alebo povolenia','Pôvodné kolaudačné/stavebné rozhodnutie.']],
    'zmena stavby':[['Pôvodná projektová dokumentácia','Podklad pre návrh zmeny.'],['Rozmery existujúcej stavby','Aktuálny stav stavby.']],
    'dodatočná legalizácia':[['Staré rozhodnutia alebo povolenia','Čo k stavbe existuje.'],['Zameranie skutočného stavu','Reálny stav postavenej stavby.'],['Vyjadrenia od obce alebo úradu','Čo už úrad k veci uviedol.']],
    'prístavba / nadstavba':[['Pôvodná projektová dokumentácia','Pre nadväznosť na existujúcu stavbu.'],['Rozmery existujúcej stavby','Aby prístavba/nadstavba sadla.']]
  };
  let list=base.slice();
  const key=Object.keys(extra).find(k=>typ&&(typ.includes(k)||k.includes(typ)));
  if(key) list=list.concat(extra[key]);
  botMsg(`Checklist dokumentov${typ?(' pre: <b>'+esc(typ)+'</b>'):''}. Odškrtnite si, čo už máte. <span class="mini">Pri každom bode je krátke vysvetlenie, načo je dobrý.</span>`);
  let h='<div class="panel"><div class="panel-h"><span class="pin"></span>Dokumenty</div><div class="panel-b" data-chk>';
  list.forEach(it=>h+=`<div class="check"><div class="box">${I.chk}</div><div><div class="ct">${it[0]}</div><div class="cd">${it[1]}</div></div></div>`);
  h+='</div></div>';
  const m=botMsg(h);
  m.querySelectorAll('.check .box').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  m.querySelectorAll('.check .ct, .check .cd').forEach(t=>t.onclick=()=>{const b=t.closest('.check').querySelector('.box');b.classList.toggle('on');});
  setTimeout(()=>chipRow([
    {t:'Vytvoriť správu na úrad',ic:I.mail,primary:true,fn:flowLetter},
    {t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar},
    {t:'Späť na menu',fn:menu}
  ]),300);
}

function markBad(scope,fields){
  fields.forEach(f=>{const e=scope.querySelector(`[data-f="${f}"]`);if(e){e.classList.add('bad');setTimeout(()=>e.classList.remove('bad'),2200);}});
}

/* ——— prehliadač vedomostnej bázy ——— */
function flowKB(){
  botMsg('Tu nájdete <b>kompletný prehľad</b> — služby, postupy, pojmy aj časté otázky. Vyberte oblasť, alebo dole napíšte, čo hľadáte (napr. <i>kolaudácia, prístavba, cena, územný plán</i>).');
  const m=botMsg(`<div class="panel"><div class="panel-h"><span class="pin"></span>Oblasti</div><div class="panel-b" data-cats></div></div>`);
  const wrap=m.querySelector('[data-cats]');
  CATS.forEach(c=>{
    const n=c.id==='dokumenty'?'' :` · ${KB.filter(k=>k.cat===c.id).length} tém`;
    const row=el(`<button class="kbcat">${c.ic}<div><div class="kt">${c.t}</div><div class="kd">${c.d}${n}</div></div>${I.arrow}</button>`);
    row.onclick=()=>{ userMsg(c.t); typing(()=> c.id==='dokumenty'?flowChecklist():showCat(c.id)); };
    wrap.appendChild(row);
  });
  scroll();
}
function showCat(catId){
  const c=CATS.find(x=>x.id===catId);
  const items=KB.filter(k=>k.cat===catId);
  botMsg(`<b>${c.t}</b> — vyberte tému:`);
  chipRow(items.map(k=>({t:k.title,fn:()=>openTopic(k.id)})).concat([{t:'Späť na oblasti',fn:flowKB}]));
}
function openTopic(id){
  const k=KB.find(x=>x.id===id); if(!k)return;
  botMsg(`<div class="panel"><div class="panel-h"><span class="pin"></span>${k.title}</div><div class="panel-b" style="font:500 13px/1.55 var(--font);color:var(--ink-3)">${k.body}</div></div>`);
  if(k.rel&&k.rel.length) setTimeout(()=>chipRow(resolveRel(k.rel)),260);
}
function resolveRel(rel){
  const acts={
    need:{t:'Zistiť, čo potrebujem',ic:I.search,fn:flowNeed},
    steps:{t:'Postup pri povolení',ic:I.steps,fn:flowSteps},
    letter:{t:'Vytvoriť správu na úrad',ic:I.mail,fn:flowLetter},
    pkg:{t:'Projektový štartovací balík',ic:I.pkg,fn:flowPackage},
    cal:{t:'Rezervovať konzultáciu',ic:I.cal,fn:flowCalendar},
    checklist:{t:'Checklist dokumentov',ic:I.list,fn:()=>flowChecklist()},
    lead:{t:'Poslať dopyt',ic:I.send,fn:flowLead}
  };
  const out=[];
  rel.forEach(r=>{
    if(r.startsWith('topic:')){const k=KB.find(x=>x.id===r.slice(6));if(k)out.push({t:k.title,fn:()=>openTopic(k.id)});}
    else if(r.startsWith('act:')){const a=acts[r.slice(4)];if(a)out.push(a);}
  });
  out.push({t:'Témy',fn:flowKB});
  return out;
}
function searchKB(q){
  const s=q.toLowerCase().trim();
  if(s.length<2) return [];
  const words=s.split(/\s+/);
  return KB.map(k=>{
    const hay=(k.title+' '+k.tags+' '+k.cat).toLowerCase();
    let score=0;
    words.forEach(w=>{ if(hay.includes(w)) score+= k.title.toLowerCase().includes(w)?3:1; });
    return {k,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,6).map(x=>x.k);
}

  const tn=el('<div class="msg bot think-row"><div class="ma">'+mono()+'</div><div class="col2"><div class="typing"><span></span><span></span><span></span></div><div class="think"></div></div></div>');
  body.appendChild(tn);scroll();
  const think=startThinking(tn.querySelector('.think'), t);
  try{
    const r=await fetch(CFG.chatEndpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:aiHistory.concat([{role:'user',content:t}])})});
    if(!r.ok) throw new Error('http');
    const d=await r.json();
    const reply=((d&&d.reply)||'').trim();
    think.stop(); tn.remove();
    if(!reply) throw new Error('empty');
    aiHistory.push({role:'user',content:t},{role:'assistant',content:reply});
    if(aiHistory.length>16) aiHistory=aiHistory.slice(-16);
    typeReply(reply, ()=>chipRow(smartChips(t,reply)));
  }catch(e){ think.stop(); tn.remove(); legacyAnswer(t); }
}
/* „Premýšľajúci" stav — počas čakania sa mení, o čom asistent uvažuje,
   podľa témy otázky (nie iba bodky). */
function thinkPhrases(q){
  const s=q.toLowerCase(); let p=[];
  if(/kolaud/.test(s)) p=['Prechádzam postup pri kolaudácii…','Pozerám, aké revízie a doklady treba…'];
  else if(/ohlás|ohlas|drobn|garáž|garaz|plot|prístre|pristre|altán|altan/.test(s)) p=['Zisťujem, či pre túto stavbu stačí ohlásenie…','Prechádzam postup ohlásenia drobnej stavby…'];
  else if(/povolen/.test(s)) p=['Prechádzam postup pri stavebnom povolení…','Pozerám, čo treba doložiť k žiadosti…'];
  else if(/prístav|pristav|nadstav|rekonštr|rekonstr|zmena stav/.test(s)) p=['Pozerám možnosti pri zásahu do existujúcej stavby…','Zvažujem, či ide o ohlásenie alebo povolenie…'];
  else if(/pozemk|kúp|kup|parcel|územn|uzemn|regulat/.test(s)) p=['Overujem, čo si treba zistiť o pozemku…','Prechádzam územný plán a regulatívy…'];
  else if(/dokument|podklad|list vlast|katastr|prílo|prilo/.test(s)) p=['Skladám zoznam potrebných dokumentov…'];
  else if(/cena|koľko|kolko|stojí|stoji|rozpoč|rozpoc|ponuk/.test(s)) p=['Pozerám, od čoho závisí cena a rozsah…'];
  else if(/projekt|dokumentác|dokumentac|štúdi|studi|statik|energet/.test(s)) p=['Prechádzam, čo projektová dokumentácia obsahuje…'];
  else p=['Premýšľam nad vašou otázkou…'];
  p.push('Formulujem zrozumiteľnú odpoveď…');
  return p;
}
function startThinking(elm, q){
  const phrases=thinkPhrases(q); let i=0;
  elm.textContent=phrases[0];
  const iv=setInterval(()=>{
    i=(i+1)%phrases.length;
    elm.style.opacity=0;
    setTimeout(()=>{ elm.textContent=phrases[i]; elm.style.opacity=1; },170);
  },1500);
  return { stop(){ clearInterval(iv); } };
}
/* Postupné vypisovanie AI odpovede (typewriter). Na konci sa text
   prekreslí na plné formátovanie a uloží do histórie (local + KV). */
function typeReply(reply,done){
  const t=stamp(); const m=bubble('bot','',t); const mb=m.querySelector('.mb');
  const TICK=32;                                          // interval snímky (ms)
  const dur=Math.min(5200, Math.max(2400, reply.length*24)); // celé písanie ~2,4–5,2 s
  const step=Math.max(1, Math.round(reply.length/(dur/TICK)));
  let i=0, tick=0;
  const iv=setInterval(()=>{
    i=Math.min(reply.length, i+step);
    mb.innerHTML=esc(reply.slice(0,i)).replace(/\n/g,'<br>')+'<span class="caret"></span>';
    if(++tick%2===0) scroll();
    if(i>=reply.length){
      clearInterval(iv);
      const html=formatAI(reply);
      mb.innerHTML=html;
      if(!restoring){ convo.push({r:'bot',h:html,t:t}); saveConvo(); }
      scroll();
      setTimeout(()=>{ if(done) done(); },200);
    }
  },TICK);
}
/* Kontextové follow-up chipy — asistent sám ponúkne logický ďalší krok
   podľa toho, o čom bola otázka a odpoveď. */
function smartChips(question,reply){
  const s=(question+' '+reply).toLowerCase();
  const out=[];
  const add=(c)=>{ if(out.length<3 && !out.some(x=>x.t===c.t)) out.push(c); };
  if(/kolaud/.test(s)) add({t:'Postup kolaudácie krok za krokom',ic:I.steps,fn:()=>topic('kol')});
  else if(/ohlás|ohlas|drobn/.test(s)) add({t:'Postup ohlásenia krok za krokom',ic:I.steps,fn:()=>topic('od')});
  else if(/prístav|pristav|nadstav|zmena stav/.test(s)) add({t:'Postup pri prístavbe',ic:I.steps,fn:()=>topic('zmena')});
  else if(/povolen/.test(s)) add({t:'Postup povolenia krok za krokom',ic:I.steps,fn:()=>topic('sp')});
  if(/dokument|podklad|list vlastníctva|list vlastnictva|katastr|prílo|prilo/.test(s)) add({t:'Checklist dokumentov',ic:I.list,fn:()=>flowChecklist()});
  if(/napís|napis|správ|sprav|žiados|ziados|e-?mail.*(úrad|urad|obec)|(úrad|urad|obec).*(otázk|otazk)/.test(s)) add({t:'Pripraviť správu na úrad',ic:I.mail,fn:()=>flowLetter()});
  if(/cena|koľko|kolko|stojí|stoji|rozpoč|rozpoc|ponuk/.test(s)) add({t:'Poslať nezáväzný dopyt',ic:I.send,fn:flowLead});
  if(/konzult|termín|termin|stretnut|osobne/.test(s)) out.unshift(RESV);
  if(!out.some(x=>x.t===RESV.t)) add(RESV);
  if(aiHistory.length>=2) out.push({t:'Poslať zhrnutie na e-mail',ic:I.mail,fn:emailSummary});
  out.push({t:'Hlavné menu',fn:menu});
  return out;
}
/* Bod 4 — pošli klientovi (aj firme) zhrnutie konverzácie e-mailom */
function buildSummary(){
  const lines=['Zhrnutie vašej konverzácie s asistentom Aplan:',''];
  aiHistory.forEach(m=>{
    if(m.role==='user') lines.push('Otázka: '+m.content);
    else lines.push('Odpoveď: '+m.content,'');
  });
  lines.push('Odporúčaný ďalší krok: nezáväzná konzultácia s projektantom, ktorý váš prípad posúdi presne.');
  return lines.join('\n');
}
function emailSummary(){
  if(aiHistory.length<2){ botMsg('Najprv sa ma niečo spýtajte — potom vám celé zhrnutie pošlem na e-mail.'); setTimeout(()=>chipRow([RESV,{t:'Hlavné menu',fn:menu}]),150); return; }
  const m=botMsg(`<div class="panel"><div class="panel-h"><span class="pin"></span>Poslať zhrnutie na e-mail</div><div class="panel-b" data-sum>
    <div class="field"><label>Váš e-mail</label><input data-f="em" type="email" placeholder="vas@email.sk"></div>
    ${gdprField()}
    <button class="btn-go">Poslať zhrnutie</button></div></div>`,{persist:false});
  const p=m.querySelector('[data-sum]'); const btn=p.querySelector('.btn-go');
  btn.onclick=async ()=>{
    if(btn.dataset.busy) return;
    const em=val(p,'em');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){ markBad(p,['em']); return; }
    if(!p.querySelector('[data-f="gdpr"]').checked){ botMsg('Prosím potvrďte súhlas so spracovaním osobných údajov.'); return; }
    btn.dataset.busy='1'; btn.disabled=true; const lbl=btn.textContent; btn.textContent='Odosielam…';
    try{
      await sendLead({predmet:'Zhrnutie konzultácie (klient)',email:em,meno:'Zhrnutie pre klienta',popis:'Klient si vyžiadal zhrnutie konverzácie.',clientCopy:true,summary:buildSummary()});
      m.remove();
      botMsg('<div class="confirm"><div class="ci">Odoslané ✓</div><div class="cb">Zhrnutie sme poslali na <b>'+esc(em)+'</b>. Kópiu má aj Aplan — ak budete chcieť pokračovať, ozveme sa vám.</div></div>');
      backMenu();
    }catch(e){ btn.disabled=false;btn.dataset.busy='';btn.textContent=lbl; botMsg('<div class="confirm err"><div class="ci">Nepodarilo sa odoslať</div><div class="cb">Skúste to prosím znova, alebo nám napíšte na <a href="mailto:'+CFG.email+'">'+CFG.email+'</a>.</div></div>'); }
  };
}
/* AI odpoveď → čitateľné HTML: odseky + odrážky z riadkov začínajúcich "- " */
function formatAI(text){
  const lines=esc(text).split('\n');
  let html='',list=[];
  const flush=()=>{ if(list.length){ html+='<ul class="ai-ul">'+list.map(x=>'<li>'+x+'</li>').join('')+'</ul>'; list=[]; } };
  lines.forEach(ln=>{
    const l=ln.trim();
    if(/^[-•]\s+/.test(l)) list.push(l.replace(/^[-•]\s+/,''));
    else { flush(); if(l) html+='<p class="ai-p">'+l+'</p>'; }
  });
  flush();
  return html||esc(text);
}
function legacyAnswer(t){
  const s=t.toLowerCase();
  typing(()=>{
    const hits=searchKB(s);
    if(hits.length){
      if(hits.length===1){ openTopic(hits[0].id); return; }
      botMsg(`Našiel som ${hits.length} tém k „<b>${esc(t)}</b>". Vyberte, čo sedí:`);
      chipRow(hits.map(k=>({t:k.title,fn:()=>openTopic(k.id)})).concat([{t:'Prehľadať všetky témy',ic:I.book,fn:flowKB}]));
      return;
    }
    if(/termín|termin|konzult|stretnut|kalend|rezerv/.test(s)){ flowCalendar(); return; }
    if(/správ|sprav|napís|napis|e-?mail.*úrad|list úradu/.test(s)){ flowLetter(); return; }
    if(/dopyt|kontakt|ozvite|zavolaj/.test(s)){ flowLead(); return; }
    if(/balík|balik|štartov|startov/.test(s)){ flowPackage(); return; }
    if(/chýbaj|chybaj|checklist/.test(s)){ topic('podklady'); return; }
    botMsg('Túto konkrétnu vec nemám v prehľade, ale rád vás nasmerujem. Skúste iné slovo, prejdite si témy, alebo pošlite dopyt a ozve sa vám projektant.');
    setTimeout(()=>chipRow([
      {t:'Prehľadať témy a otázky',ic:I.book,primary:true,fn:flowKB},
      {t:'Zistiť, čo potrebujem',ic:I.search,fn:flowNeed},
      {t:'Poslať dopyt',ic:I.send,fn:flowLead}
    ]),200);
  });
}
input.addEventListener('keydown',e=>{if(e.key==='Enter')aiUserSend();});

/* ——— animovaný placeholder v inpute (jemný typewriter) ——— */
const phPhrases=[
  'Čo potrebujem k povoleniu?',
  'Ako komunikovať s úradom?',
  'Aké podklady si pripraviť?',
  'Dá sa objednať konzultácia?'
];
let phI=0,phChar=0,phDir=1,phCtx=null;
/* zmestí sa text (aj s kurzorom) do aktuálnej šírky inputu? */
function phFits(text){
  try{
    const cs=getComputedStyle(input);
    if(!phCtx) phCtx=document.createElement('canvas').getContext('2d');
    phCtx.font=`${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;
    const avail=input.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight)-4;
    return phCtx.measureText(text).width<=avail;
  }catch(e){ return text.length<=26; }
}
function phTick(){
  if(document.activeElement===input || input.value){ input.placeholder='Napíšte správu…'; return setTimeout(phTick,1000); }
  const full=phPhrases[phI];
  const cand=full.slice(0,Math.max(0,phChar+phDir));
  // ak by ďalší znak pretiekol input, radšej začni mazať (text sa nikdy neoreže)
  if(phDir>0 && phChar>1 && !phFits(cand+'│')){ phDir=-1; return setTimeout(phTick,1100); }
  phChar+=phDir;
  input.placeholder=full.slice(0,Math.max(0,phChar))+(phChar<full.length&&phChar>0?'│':'');
  if(phChar>=full.length){ phDir=-1; return setTimeout(phTick,1800); }
  if(phChar<=0){ phDir=1; phI=(phI+1)%phPhrases.length; return setTimeout(phTick,360); }
  setTimeout(phTick, phDir>0?52:26);
}
setTimeout(phTick,1500);

/* ——— teaser po krátkej chvíli ——— */
setTimeout(aiTeaserShow,2600);
